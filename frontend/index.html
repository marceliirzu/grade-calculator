<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#09090B">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GPA Calculator</title>

    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/modals.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/grade-scale.css">
    <link rel="stylesheet" href="css/pages/landing.css">
    <link rel="stylesheet" href="css/pages/class-setup.css">
    <link rel="stylesheet" href="css/pages/class-detail.css">
    <link rel="stylesheet" href="css/pages/category-editor.css">

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body { opacity: 0; transition: opacity 0.3s ease; }
        body.loaded { opacity: 1; }

        /* Logo */
        .logo-container {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
            cursor: pointer;
            text-decoration: none;
        }

        .logo-mark {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 100%);
            border-radius: var(--radius-lg);
            position: relative;
        }

        .logo-mark-text {
            font-family: var(--font-family-mono);
            font-size: 11px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--color-text-primary);
            letter-spacing: -0.02em;
        }

        .logo-text-muted {
            color: var(--color-text-muted);
            font-weight: 400;
        }

        /* A+ Toggle */
        .aplus-toggle {
            display: flex;
            align-items: center;
            gap: var(--spacing-1-5);
            padding: var(--spacing-1-5) var(--spacing-2-5);
            background: var(--glass-bg);
            border-radius: var(--radius-full);
            font-size: var(--font-size-xs);
            color: var(--color-text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid var(--color-border);
        }

        .aplus-toggle:hover {
            background: var(--color-bg-glass-hover);
            border-color: var(--color-border-light);
        }

        .aplus-toggle .toggle-label {
            font-weight: 600;
            color: var(--color-primary);
            font-family: var(--font-family-mono);
        }

        .aplus-toggle .toggle-value {
            background: var(--color-primary-subtle);
            color: var(--color-primary);
            padding: 1px 6px;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-family: var(--font-family-mono);
            font-size: 11px;
            border: 1px solid rgba(129, 140, 248, 0.15);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-container" id="logoContainer">
                    <div class="logo-mark">
                        <span class="logo-mark-text" id="logoMarkText">GPA</span>
                    </div>
                    <span class="logo-text">GPA <span class="logo-text-muted">Calculator</span></span>
                </div>
                <div class="user-menu" id="userMenu">
                    <!-- A+ Toggle loads here -->
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content" id="mainContent"></main>

        <!-- Modal Container -->
        <div id="modalContainer"></div>
    </div>

    <!-- JavaScript -->
    <script src="js/config.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/parsers/syllabusParser.js"></script>
    <script src="js/parsers/gradebookParser.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/services/authService.js"></script>
    <script src="js/services/classService.js"></script>
    <script src="js/services/categoryService.js"></script>
    <script src="js/services/gradeService.js"></script>
    <script src="js/services/syllabusService.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/classCard.js"></script>
    <script src="js/components/gpaDisplay.js"></script>
    <script src="js/components/gradeScaleEditor.js"></script>
    <script src="js/components/categoryCard.js"></script>
    <script src="js/components/gradeEntry.js"></script>
    <script src="js/components/rulesEditor.js"></script>
    <script src="js/pages/landing.js"></script>
    <script src="js/pages/classSetup.js"></script>
    <script src="js/pages/classDetail.js"></script>
    <script src="js/pages/categoryEditor.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.body.classList.add('loaded');
    </script>
</body>
</html>
