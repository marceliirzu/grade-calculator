<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050507">
    <title>CalcYourGPA - Grade Calculator</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/modals.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/grade-scale.css">
    <link rel="stylesheet" href="css/components/rules.css">
    <link rel="stylesheet" href="css/pages/landing.css">
    <link rel="stylesheet" href="css/pages/class-setup.css">
    <link rel="stylesheet" href="css/pages/class-detail.css">
    <link rel="stylesheet" href="css/pages/category-editor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body{opacity:0;transition:opacity .3s ease}
        body.loaded{opacity:1}

        /* Start Page */
        .start-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
        .start-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(124,58,237,.12),transparent 70%),radial-gradient(ellipse 50% 40% at 80% 60%,rgba(6,182,212,.06),transparent 70%),radial-gradient(ellipse 40% 30% at 10% 80%,rgba(124,58,237,.04),transparent);pointer-events:none}
        .start-page::after{content:'';position:absolute;top:50%;left:50%;width:600px;height:600px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(124,58,237,.04),transparent 60%);pointer-events:none;animation:pulse-glow 6s ease-in-out infinite}
        .start-content{text-align:center;max-width:480px;position:relative;z-index:1;animation:fadeInUp .6s ease}
        .hero-logo-animation{font-family:'JetBrains Mono',monospace;font-size:5.5rem;font-weight:700;letter-spacing:-4px;display:flex;justify-content:center;margin-bottom:28px;cursor:pointer;position:relative}
        .hero-logo-animation::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:120px;height:3px;background:linear-gradient(90deg,transparent,#7C3AED,#06B6D4,transparent);border-radius:2px;opacity:.5}
        .hero-logo-animation .digit{display:inline-block;min-width:1.1ch;text-align:center;color:#7C3AED;text-shadow:0 0 60px rgba(124,58,237,.4),0 0 120px rgba(124,58,237,.15)}
        .hero-logo-animation .dot{color:#06B6D4;text-shadow:0 0 60px rgba(6,182,212,.4),0 0 120px rgba(6,182,212,.15)}
        .start-title{font-size:var(--font-size-4xl);color:var(--color-text-primary);margin-bottom:12px;font-weight:700;letter-spacing:-.04em;line-height:1.15}
        .start-subtitle{color:var(--color-text-muted);margin-bottom:2.5rem;line-height:1.7;font-size:var(--font-size-base)}
        .start-features{display:flex;flex-direction:column;gap:8px;margin-bottom:2.5rem;text-align:left}
        .feature-item{display:flex;align-items:center;gap:12px;color:#CBD5E1;font-size:var(--font-size-sm);padding:12px 16px;background:#131318;border:1px solid #1E1E2A;border-radius:var(--radius-lg);transition:all var(--transition-fast)}
        .feature-item:hover{border-color:#2A2A3A;background:#1A1A22;transform:translateX(4px)}
        .feature-icon{font-size:1.1rem;width:20px;text-align:center;flex-shrink:0}
        .start-actions{display:flex;flex-direction:column;gap:14px;align-items:center}
        .start-divider{color:var(--color-text-muted);font-size:var(--font-size-xs);position:relative;width:100%;text-align:center}
        .start-divider::before,.start-divider::after{content:'';position:absolute;top:50%;width:calc(50% - 20px);height:1px;background:#1E1E2A}
        .start-divider::before{left:0}
        .start-divider::after{right:0}
        .start-note{font-size:var(--font-size-xs);color:var(--color-text-muted);margin-top:4px}
        @media(max-width:640px){.hero-logo-animation{font-size:3.5rem}.start-title{font-size:var(--font-size-3xl)}}

        /* A+ Toggle */
        .aplus-toggle{display:flex;align-items:center;gap:6px;padding:5px 10px;background:#1A1A22;border-radius:var(--radius-full);font-size:var(--font-size-xs);color:#64748B;cursor:pointer;transition:all var(--transition-fast);border:1px solid #1E1E2A}
        .aplus-toggle:hover{background:#222230;border-color:#2A2A3A}
        .aplus-toggle .toggle-label{font-weight:600;color:#A78BFA;font-family:var(--mono)}
        .aplus-toggle .toggle-value{background:rgba(124,58,237,.12);color:#A78BFA;padding:1px 7px;border-radius:var(--radius-full);font-weight:600;font-family:var(--mono);font-size:11px}
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-content">
                <a href="#" class="header-logo" id="headerLogo" onclick="App.navigate('landing'); return false;">
                    <span class="header-brand">
                        <span class="brand-calc">Calc</span><span class="brand-your">Your</span><span class="brand-gpa">GPA</span>
                    </span>
                </a>
                <div class="user-menu" id="userMenu"></div>
            </div>
        </header>
        <main class="main-content" id="mainContent"></main>
        <div id="modalContainer"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/parsers/syllabusParser.js"></script>
    <script src="js/parsers/gradebookParser.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/services/localDataService.js"></script>
    <script src="js/services/authService.js"></script>
    <script src="js/services/classService.js"></script>
    <script src="js/services/categoryService.js"></script>
    <script src="js/services/gradeService.js"></script>
    <script src="js/services/syllabusService.js"></script>
    <script src="js/services/gradebookService.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/classCard.js"></script>
    <script src="js/components/gpaDisplay.js"></script>
    <script src="js/components/gradeScaleEditor.js"></script>
    <script src="js/components/categoryCard.js"></script>
    <script src="js/components/gradeEntry.js"></script>
    <script src="js/components/rulesEditor.js"></script>
    <script src="js/pages/landing.js"></script>
    <script src="js/pages/classSetup.js"></script>
    <script src="js/pages/classDetail.js"></script>
    <script src="js/pages/categoryEditor.js"></script>
    <script src="js/app.js"></script>
    <script>document.body.classList.add('loaded');</script>
</body>
</html>
