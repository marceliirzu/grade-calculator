<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#09090B">
    <title>CalcYourGPA - Grade Calculator</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/modals.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/grade-scale.css">
    <link rel="stylesheet" href="css/components/rules.css">
    <link rel="stylesheet" href="css/pages/landing.css">
    <link rel="stylesheet" href="css/pages/class-setup.css">
    <link rel="stylesheet" href="css/pages/class-detail.css">
    <link rel="stylesheet" href="css/pages/category-editor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body{opacity:0;transition:opacity .3s ease}
        body.loaded{opacity:1}

        /* Start Page */
        .start-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative}
        .start-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(129,140,248,.1),transparent),radial-gradient(ellipse 50% 40% at 80% 60%,rgba(52,211,153,.05),transparent);pointer-events:none}
        .start-content{text-align:center;max-width:460px;position:relative;z-index:1}
        .hero-logo-animation{font-family:'JetBrains Mono',monospace;font-size:5rem;font-weight:700;letter-spacing:-3px;display:flex;justify-content:center;margin-bottom:24px;cursor:pointer}
        .hero-logo-animation .digit{display:inline-block;min-width:1.1ch;text-align:center;color:var(--color-primary);text-shadow:0 0 50px rgba(129,140,248,.35)}
        .hero-logo-animation .dot{color:var(--color-accent);text-shadow:0 0 50px rgba(52,211,153,.35)}
        .start-title{font-size:var(--font-size-3xl);color:var(--color-text-primary);margin-bottom:10px;font-weight:700;letter-spacing:-.03em}
        .start-subtitle{color:var(--color-text-muted);margin-bottom:2rem;line-height:1.6;font-size:var(--font-size-sm)}
        .start-features{display:flex;flex-direction:column;gap:8px;margin-bottom:2.5rem;text-align:left}
        .feature-item{display:flex;align-items:center;gap:12px;color:var(--color-text-secondary);font-size:var(--font-size-sm);padding:10px 14px;background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:var(--radius-lg);transition:all var(--transition-fast)}
        .feature-item:hover{border-color:var(--color-border-light)}
        .feature-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
        .start-actions{display:flex;flex-direction:column;gap:12px;align-items:center}
        .start-divider{color:var(--color-text-muted);font-size:var(--font-size-xs)}
        .start-note{font-size:var(--font-size-xs);color:var(--color-text-muted);margin-top:4px}
        @media(max-width:640px){.hero-logo-animation{font-size:3.5rem}}

        /* A+ Toggle */
        .aplus-toggle{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--color-bg-elevated);border-radius:var(--radius-full);font-size:var(--font-size-xs);color:var(--color-text-muted);cursor:pointer;transition:all var(--transition-fast);border:1px solid var(--color-border)}
        .aplus-toggle:hover{background:var(--color-gray-800);border-color:var(--color-border-light)}
        .aplus-toggle .toggle-label{font-weight:600;color:var(--color-primary);font-family:var(--font-family-mono)}
        .aplus-toggle .toggle-value{background:rgba(129,140,248,.1);color:var(--color-primary);padding:1px 7px;border-radius:var(--radius-full);font-weight:600;font-family:var(--font-family-mono);font-size:11px}
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-content">
                <a href="#" class="header-logo" id="headerLogo" onclick="App.navigate('landing'); return false;">
                    <span class="header-brand">
                        <span class="brand-calc">Calc</span><span class="brand-your">Your</span><span class="brand-gpa">GPA</span>
                    </span>
                </a>
                <div class="user-menu" id="userMenu"></div>
            </div>
        </header>
        <main class="main-content" id="mainContent"></main>
        <div id="modalContainer"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/parsers/syllabusParser.js"></script>
    <script src="js/parsers/gradebookParser.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/services/localDataService.js"></script>
    <script src="js/services/authService.js"></script>
    <script src="js/services/classService.js"></script>
    <script src="js/services/categoryService.js"></script>
    <script src="js/services/gradeService.js"></script>
    <script src="js/services/syllabusService.js"></script>
    <script src="js/services/gradebookService.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/classCard.js"></script>
    <script src="js/components/gpaDisplay.js"></script>
    <script src="js/components/gradeScaleEditor.js"></script>
    <script src="js/components/categoryCard.js"></script>
    <script src="js/components/gradeEntry.js"></script>
    <script src="js/components/rulesEditor.js"></script>
    <script src="js/pages/landing.js"></script>
    <script src="js/pages/classSetup.js"></script>
    <script src="js/pages/classDetail.js"></script>
    <script src="js/pages/categoryEditor.js"></script>
    <script src="js/app.js"></script>
    <script>document.body.classList.add('loaded');</script>
</body>
</html>
